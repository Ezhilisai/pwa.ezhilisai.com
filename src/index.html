<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PWA Push Notifier</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PWA Push">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <script>
    // Unregister any old service workers (ngsw-worker.js etc.) on first load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => {
          const sw = reg.active || reg.installing || reg.waiting;
          if (sw && !sw.scriptURL.includes('sw.js')) {
            reg.unregister();
            console.log('[App] Unregistered old SW:', sw.scriptURL);
          }
        });
      });
    }
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
